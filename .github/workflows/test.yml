name: Unit Tests

on: [ pull_request ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        dotnet-version: [6.0, 8.0, 10.0]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x
            10.0.x

      - name: Test
        run: dotnet test -f net$({{ matrix.dotnet-version }}) --verbosity normal
