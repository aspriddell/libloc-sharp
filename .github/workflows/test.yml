name: Unit Tests

on: [ pull_request ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
        with:
          dotnet-version: |
            6.0.x
            8.0.x
            10.0.x

      - name: Build
        run: dotnet build -c Debug

      - name: Test
        run: dotnet test
